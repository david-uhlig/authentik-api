# Generates the OpenAPI client on the main branch and opens a PR for review.
#
# Review the PR and merge into `main`.
#
# Detection logic for changes is in `poll-schema-and-dispatch-updates.yaml`.
# This workflow runs regardless of changes.
#
# Keep this file in "sync" with `generate-openapi-client-on-release.yaml`.
name: Generate OpenAPI client (main)

on:
  workflow_dispatch:
  workflow_call:

env:
  OPENAPI_GENERATOR_PATH: "tmp"

jobs:
  get-release-branch:
    permissions:
      contents: write
    uses: ./.github/workflows/get-release-branch.yaml
    with:
      schema-url: "https://raw.githubusercontent.com/goauthentik/authentik/main/schema.yml"

  build-client:
    permissions:
      contents: write
      pull-requests: write
    needs: get-release-branch
    runs-on: ubuntu-latest
    env:
      AUTHENTIK_VERSION: ${{ needs.get-release-branch.outputs.authentik-version }} # 2026.2.0-rc1
      GEM_VERSION: ${{ needs.get-release-branch.outputs.gem-version }} # 2026.2.0.rc1
      BASE_BRANCH: main
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.BASE_BRANCH }}
          token: ${{ secrets.PAT }} # zizmor: ignore[secrets-outside-env]
          persist-credentials: false

      - name: Download schema artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: schema
          path: ./.authentik/

      - name: Build OpenAPI client
        uses: ./.github/actions/build-openapi-client
        with:
          output-path: ${{ env.OPENAPI_GENERATOR_PATH }}
          config-file: ./.openapi-generator/config.yaml
          openapi-file: ./.authentik/schema.yaml
          templates-dir: ./.openapi-generator/ruby-templates
          gem-version: ${{ env.GEM_VERSION }}

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.PAT }} # Need separate token to trigger workflows. # zizmor: ignore[secrets-outside-env]
          commit-message: "Update OpenAPI client (nightly)"
          branch: "openapi-client-update/nightly"
          base: main
          title: "Nightly OpenAPI client update (nightly)"
          body: |
            This PR updates the generated OpenAPI client to match the latest nightly schema from authentik's `main` branch.

            Authentik version: `${{ env.AUTHENTIK_VERSION }}`

            > Schema sourced from [goauthentik/authentik@main](https://github.com/goauthentik/authentik/blob/main/schema.yml)
          labels: nightly
          delete-branch: true
          author: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
