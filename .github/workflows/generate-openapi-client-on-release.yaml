# Generates the OpenAPI client for an authentik release and opens a PR for review.
#
# 1. Review the PR and merge.
# 2. Tag release.
# 3. Publish gem.
#
# Keep this file in "sync" with `generate-openapi-client-main.yaml`.
name: Generate OpenAPI client (authentik release)

on:
  workflow_dispatch:
    inputs:
      tag-name:
        description: "The authentik version tag, e.g. 'version/2026.2.0'"
        required: true
        type: string
  workflow_call:
    inputs:
      tag-name:
        description: "The authentik version tag detected by the calling workflow."
        required: true
        type: string

env:
  OPENAPI_GENERATOR_PATH: "tmp"

jobs:
  get-release-branch:
    permissions:
      contents: write
    uses: ./.github/workflows/get-release-branch.yaml
    with:
      schema-url: "https://raw.githubusercontent.com/goauthentik/authentik/${{ inputs.tag-name }}/schema.yml"

  build-client:
    permissions:
      contents: write
      pull-requests: write
    needs: get-release-branch
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ inputs.tag-name }}
      GEM_VERSION: ${{ needs.get-release-branch.outputs.gem-version }}
      RELEASE_BRANCH: ${{ needs.get-release-branch.outputs.release-branch }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_BRANCH }}
          persist-credentials: false

      - name: Download schema artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: schema
          path: ./.authentik/

      - name: Remove current client
        run: rm -rf "./${OPENAPI_GENERATOR_PATH}"

      - name: Build client using OpenAPI Generator
        uses: openapi-generators/openapitools-generator-action@b729d184e6b3459572c37c0e37f88a832e69b552 # v1.5.0
        with:
          generator: ruby
          config-file: ./.openapi-generator/config.yaml
          openapi-file: ./.authentik/schema.yaml
          command-args:
            -t ./.openapi-generator/ruby-templates
            --output="./${{ env.OPENAPI_GENERATOR_PATH }}"
            --additional-properties=gemVersion="${{ env.GEM_VERSION }}"

      - name: Postprocessing
        run: bin/postprocess-api "${OPENAPI_GENERATOR_PATH}"

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --stages --quiet || git commit -m "Update OpenAPI client for release ${TAG_NAME}"

      - name: Configure Git credentials
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Push branch
        run: |
          git checkout -b "openapi-client-update/${TAG_NAME}"
          git push origin HEAD

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.PAT }} # zizmor: ignore[secrets-outside-env]
          AUTHENTIK_VERSION: ${{ needs.get-release-branch.outputs.authentik-version }}
        run: |
          gh pr create \
            --base "${RELEASE_BRANCH}" \
            --head "openapi-client-update/${TAG_NAME}" \
            --title "OpenAPI client update for release ${TAG_NAME}" \
            --label release \
            --reviewer david-uhlig \
            --body "$(cat <<'EOF'
            This PR updates the generated OpenAPI client to match the schema for authentik release `${TAG_NAME}`.
          
            Authentik version: `${AUTHENTIK_VERSION}`
            Gem version: `${GEM_VERSION}`

            > Schema sourced from [goauthentik/authentik@${TAG_NAME}](https://github.com/goauthentik/authentik/blob/${TAG_NAME}/schema.yml)
          EOF
          )"        
