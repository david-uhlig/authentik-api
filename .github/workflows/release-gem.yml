name: Release Gem to RubyGems

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: "The tag to release, e.g. `v2026.2.0-rc1`"
        required: true
        type: string
  workflow_call:
    inputs:
      release-tag:
        description: "The tag to release, e.g. `v2026.2.0-rc1`"
        required: true
        type: string



jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - env:
          RELEASE_TAG: ${{ inputs.release-tag }}
        run: echo "Releasing $RELEASE_TAG to RubyGems"

      - name: Check out tagged commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.release-tag }}
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@3ff19f5e2baf30647122352b96108b1fbe250c64 # v1.299.0
        with:
          bundler-cache: true # zizmor: ignore[cache-poisoning]
          ruby-version: ruby

      - name: Release to RubyGems
        uses: rubygems/release-gem@e9a6361a0b14562539327c2a02373edc56dd3169 # v1.1.4
