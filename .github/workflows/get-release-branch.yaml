# Downloads the authentik OpenAPI schema, extracts the version, derives the
# release branch name, and creates the branch if it does not exist yet.
#
# The release branch is the major.minor version of the schema version,
# e.g. `2026.2.0` -> `2026.2`.
#
# The downloaded schema is uploaded as an artifact named `schema` so that
# later jobs can reuse it without a second download.
name: Get release branch

on:
  workflow_call:
    inputs:
      schema-url:
        description: "URL to download the authentik OpenAPI schema from."
        required: true
        type: string
    outputs:
      release-branch:
        description: "The release branch name derived from the schema version, e.g., 2026.2."
        value: ${{ jobs.get-release-branch.outputs.release-branch }}
      authentik-version:
        description: "The authentik version extracted from the schema, e.g., 2026.2.2-rc1."
        value: ${{ jobs.get-release-branch.outputs.authentik-version }}
      gem-version:
        description: "The gem version based on the authentik version, e.g., 2026.2.2.rc1"
        value: ${{ jobs.get-release-branch.outputs.gem-version }}

permissions:
  contents: write

jobs:
  get-release-branch:
    runs-on: ubuntu-latest
    outputs:
      authentik-version: ${{ steps.get-authentik-version.outputs.result }}
      gem-version: ${{ steps.get-gem-version.outputs.result }}
      release-branch: ${{ steps.get-release-branch.outputs.result }}
    steps:
      - name: Checkout code  # zizmor: ignore[artipacked]
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download authentik's OpenAPI document
        env:
          SCHEMA_URL: ${{ inputs.schema-url }}
        run: |
          echo "Downloading $SCHEMA_URL"
          curl -fsSL "$SCHEMA_URL" -o ./schema.yaml

      - name: Extract authentik version
        id: get-authentik-version
        uses: mikefarah/yq@0f4fb8d35ec1a939d78dd6862f494d19ec589f19 # v4.52.5
        with:
          cmd: yq -r ".info.version" ./schema.yaml

      - name: Validate authentik version
        if: steps.get-authentik-version.outputs.result == ''
        run: |
          echo "Error: .info.version missing from schema.yaml"
          exit 1

      - name: Get version
        id: get-gem-version
        env:
          AUTHENTIK_VERSION: ${{ steps.get-authentik-version.outputs.result }}
        run: |
          GEM_VERSION="$(echo "$AUTHENTIK_VERSION" | tr "-" ".")"
          echo "result=$GEM_VERSION" >> "$GITHUB_OUTPUT"

      - id: get-release-branch
        name: Get release branch name
        env:
          AUTHENTIK_VERSION: ${{ steps.get-authentik-version.outputs.result }}
        run: |
          RELEASE_BRANCH="$(echo "$AUTHENTIK_VERSION" | sed -E 's/^([0-9]{4}\.[0-9]+)(\.[0-9]+.*)?$/\1/')"
          echo "result=$RELEASE_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Create release branch if missing
        env:
          RELEASE_BRANCH: ${{ steps.get-release-branch.outputs.result }}
        run: |
          if ! git switch "$RELEASE_BRANCH"; then
            git checkout -B "$RELEASE_BRANCH"
            git push origin HEAD
          fi

      - name: Upload schema artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: schema
          path: ./schema.yaml
